<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#eef3fb"/>
      <stop offset="100%" stop-color="#dde6f3"/>
    </linearGradient>
    <linearGradient id="winChromeBefore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6e6e6"/>
      <stop offset="100%" stop-color="#cfcfcf"/>
    </linearGradient>
    <linearGradient id="winChromeAfter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#1853b8"/>
    </linearGradient>
    <linearGradient id="gridHeader" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9eef5"/>
      <stop offset="100%" stop-color="#d4dceb"/>
    </linearGradient>
    <linearGradient id="detailBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafcff"/>
      <stop offset="100%" stop-color="#e6eefb"/>
    </linearGradient>
    <linearGradient id="helpYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3c2"/>
      <stop offset="100%" stop-color="#ffe48a"/>
    </linearGradient>

    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#1f6feb"/>
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#d63a3a"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L12,7 L0,14 Z" fill="#1f9d55"/>
    </marker>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0a2540" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect x="0" y="0" width="1200" height="720" fill="url(#pageBg)"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0a2540">
    Befund-Detail-Panel: Split-Layout statt Help-Panel unten
  </text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#4a5b75">
    Aktuell: Wechsel zwischen Grid und Help-Panel &#8211; Vorschlag: Grid links, Detail rechts (resizable Splitter)
  </text>

  <!-- ====================== VORHER ====================== -->
  <g transform="translate(40, 100)" filter="url(#softShadow)">
    <!-- Window frame -->
    <rect x="0" y="0" width="520" height="560" rx="8" fill="#ffffff" stroke="#9aa6bf" stroke-width="1.5"/>

    <!-- Title bar (gray = unmodern/before) -->
    <rect x="0" y="0" width="520" height="28" rx="8" fill="url(#winChromeBefore)"/>
    <rect x="0" y="20" width="520" height="8" fill="url(#winChromeBefore)"/>
    <text x="12" y="19" font-size="12" font-weight="600" fill="#3a3a3a">Static Code Analyser</text>
    <circle cx="478" cy="14" r="6" fill="#f5b62f" stroke="#c89220" stroke-width="0.5"/>
    <circle cx="497" cy="14" r="6" fill="#3cc257" stroke="#229038" stroke-width="0.5"/>
    <circle cx="498" cy="14" r="0" />
    <rect x="490" y="8" width="12" height="12" rx="2" fill="none"/>
    <circle cx="497" cy="14" r="6" fill="#3cc257"/>
    <path d="M491,14 h12 M497,8 v12" stroke="#229038" stroke-width="0.6"/>
    <circle cx="478" cy="14" r="6" fill="#f5b62f"/>
    <path d="M472,14 h12" stroke="#c89220" stroke-width="0.6"/>
    <circle cx="459" cy="14" r="6" fill="#e35545"/>
    <path d="M455,10 l8,8 M455,18 l8,-8" stroke="#a53026" stroke-width="0.8"/>

    <!-- Toolbar -->
    <rect x="1" y="28" width="518" height="58" fill="#f5f7fa" stroke="#dbe1ec"/>
    <text x="14" y="46" font-size="11" fill="#3a4a63">Projektpfad:</text>
    <rect x="92" y="34" width="378" height="18" fill="#fff" stroke="#bcc6d8"/>
    <text x="14" y="72" font-size="11" fill="#3a4a63">Speicherpfad:</text>
    <rect x="92" y="60" width="378" height="18" fill="#fff" stroke="#bcc6d8"/>

    <rect x="14" y="94" width="120" height="24" rx="3" fill="#e8edf5" stroke="#bcc6d8"/>
    <text x="74" y="110" text-anchor="middle" font-size="11" fill="#2a3a55">Datei analysieren</text>
    <rect x="142" y="94" width="140" height="24" rx="3" fill="#e8edf5" stroke="#bcc6d8"/>
    <text x="212" y="110" text-anchor="middle" font-size="11" fill="#2a3a55">Verzeichnis analysieren</text>

    <!-- Result Grid (full width) -->
    <rect x="10" y="128" width="500" height="240" fill="#ffffff" stroke="#9aa6bf"/>
    <rect x="10" y="128" width="500" height="22" fill="url(#gridHeader)" stroke="#9aa6bf"/>
    <text x="22" y="143" font-size="11" fill="#0a2540" font-weight="700">Datei</text>
    <text x="180" y="143" font-size="11" fill="#0a2540" font-weight="700">Methode</text>
    <text x="290" y="143" font-size="11" fill="#0a2540" font-weight="700">Zeile</text>
    <text x="340" y="143" font-size="11" fill="#0a2540" font-weight="700">Regel</text>

    <g font-size="11" fill="#1a2536">
      <line x1="10" y1="172" x2="510" y2="172" stroke="#e6e9f0"/>
      <line x1="10" y1="194" x2="510" y2="194" stroke="#e6e9f0"/>
      <line x1="10" y1="216" x2="510" y2="216" stroke="#e6e9f0"/>
      <line x1="10" y1="238" x2="510" y2="238" stroke="#e6e9f0"/>
      <line x1="10" y1="260" x2="510" y2="260" stroke="#e6e9f0"/>
      <line x1="10" y1="282" x2="510" y2="282" stroke="#e6e9f0"/>
      <line x1="10" y1="304" x2="510" y2="304" stroke="#e6e9f0"/>

      <text x="22" y="166">uParser.pas</text><text x="180" y="166">ParseUnit</text><text x="290" y="166">142</text><text x="340" y="166" fill="#b85a00">LongMethod</text>

      <!-- selected row (highlighted blue) -->
      <rect x="10" y="172" width="500" height="22" fill="#1f6feb" opacity="0.18"/>
      <rect x="10" y="172" width="3" height="22" fill="#d63a3a"/>
      <text x="22" y="188" font-weight="600">uLeakDetector2.pas</text><text x="180" y="188">DetectLeak</text><text x="290" y="188">87</text><text x="340" y="188" fill="#d63a3a" font-weight="700">MemoryLeak</text>

      <text x="22" y="210">uMainForm.pas</text><text x="180" y="210">FormCreate</text><text x="290" y="210">23</text><text x="340" y="210" fill="#c87a00">EmptyExcept</text>
      <text x="22" y="232">uSQLInjection.pas</text><text x="180" y="232">BuildQuery</text><text x="290" y="232">55</text><text x="340" y="232" fill="#d63a3a">SQLInjection</text>
      <text x="22" y="254">uDivByZero.pas</text><text x="180" y="254">Calc</text><text x="290" y="254">31</text><text x="340" y="254" fill="#c87a00">DivByZero</text>
      <text x="22" y="276">uMagicNumbers.pas</text><text x="180" y="276">Limit</text><text x="290" y="276">12</text><text x="340" y="276" fill="#1f9d55">MagicNumber</text>
      <text x="22" y="298">uTodoComment.pas</text><text x="180" y="298">Process</text><text x="290" y="298">9</text><text x="340" y="298" fill="#1f9d55">TodoComment</text>
    </g>

    <!-- Help panel below (separate / Tab) - garish yellow = the problem -->
    <rect x="10" y="378" width="500" height="160" fill="url(#helpYellow)" stroke="#d8a82a"/>
    <rect x="10" y="378" width="500" height="22" fill="#fcd86b" stroke="#c8941d"/>
    <text x="20" y="393" font-size="11" font-weight="700" fill="#5a4810">Hilfe / Beschreibung</text>
    <text x="20" y="418" font-size="11" fill="#3a2e10">Anwender muss Blick zwischen Grid und Panel hin- und</text>
    <text x="20" y="434" font-size="11" fill="#3a2e10">herwandern bzw. Tab umschalten, um Befund zu lesen.</text>
    <text x="20" y="466" font-size="10.5" fill="#7a5510" font-style="italic">MemoryLeak &#8211; Objekt nie freigegeben...</text>

    <!-- Eye-movement arrow -->
    <path d="M 260,200 Q 380,310 260,400" fill="none" stroke="#d63a3a" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>
    <text x="290" y="318" font-size="11" fill="#d63a3a" font-weight="700">Blickwechsel</text>
    <text x="290" y="334" font-size="11" fill="#d63a3a" font-weight="700">&amp; Scrollen</text>

    <!-- Label -->
    <rect x="0" y="-26" width="200" height="20" rx="10" fill="#d63a3a"/>
    <text x="100" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">VORHER</text>
  </g>

  <!-- ====================== NACHHER ====================== -->
  <g transform="translate(640, 100)" filter="url(#softShadow)">
    <!-- Window frame -->
    <rect x="0" y="0" width="520" height="560" rx="8" fill="#ffffff" stroke="#1f6feb" stroke-width="1.8"/>

    <!-- Title bar (blue = modern/after) -->
    <rect x="0" y="0" width="520" height="28" rx="8" fill="url(#winChromeAfter)"/>
    <rect x="0" y="20" width="520" height="8" fill="url(#winChromeAfter)"/>
    <text x="12" y="19" font-size="12" font-weight="700" fill="#fff">Static Code Analyser</text>
    <circle cx="497" cy="14" r="6" fill="#3cc257"/>
    <circle cx="478" cy="14" r="6" fill="#f5b62f"/>
    <circle cx="459" cy="14" r="6" fill="#e35545"/>

    <!-- Toolbar -->
    <rect x="1" y="28" width="518" height="58" fill="#f5f7fa" stroke="#dbe1ec"/>
    <text x="14" y="46" font-size="11" fill="#3a4a63">Projektpfad:</text>
    <rect x="92" y="34" width="378" height="18" fill="#fff" stroke="#bcc6d8"/>
    <text x="14" y="72" font-size="11" fill="#3a4a63">Speicherpfad:</text>
    <rect x="92" y="60" width="378" height="18" fill="#fff" stroke="#bcc6d8"/>

    <rect x="14" y="94" width="120" height="24" rx="3" fill="#1f6feb" stroke="#1853b8"/>
    <text x="74" y="110" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Datei analysieren</text>
    <rect x="142" y="94" width="140" height="24" rx="3" fill="#1f6feb" stroke="#1853b8"/>
    <text x="212" y="110" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Verzeichnis analysieren</text>

    <!-- Grid (left half) -->
    <rect x="10" y="128" width="295" height="410" fill="#ffffff" stroke="#9aa6bf"/>
    <rect x="10" y="128" width="295" height="22" fill="url(#gridHeader)" stroke="#9aa6bf"/>
    <text x="20" y="143" font-size="11" fill="#0a2540" font-weight="700">Datei</text>
    <text x="135" y="143" font-size="11" fill="#0a2540" font-weight="700">Regel</text>
    <text x="245" y="143" font-size="11" fill="#0a2540" font-weight="700">Zeile</text>

    <g font-size="11" fill="#1a2536">
      <line x1="10" y1="172" x2="305" y2="172" stroke="#e6e9f0"/>
      <line x1="10" y1="194" x2="305" y2="194" stroke="#e6e9f0"/>
      <line x1="10" y1="216" x2="305" y2="216" stroke="#e6e9f0"/>
      <line x1="10" y1="238" x2="305" y2="238" stroke="#e6e9f0"/>
      <line x1="10" y1="260" x2="305" y2="260" stroke="#e6e9f0"/>
      <line x1="10" y1="282" x2="305" y2="282" stroke="#e6e9f0"/>
      <line x1="10" y1="304" x2="305" y2="304" stroke="#e6e9f0"/>
      <line x1="10" y1="326" x2="305" y2="326" stroke="#e6e9f0"/>
      <line x1="10" y1="348" x2="305" y2="348" stroke="#e6e9f0"/>
      <line x1="10" y1="370" x2="305" y2="370" stroke="#e6e9f0"/>
      <line x1="10" y1="392" x2="305" y2="392" stroke="#e6e9f0"/>

      <text x="20" y="166">uParser.pas</text><text x="135" y="166" fill="#b85a00">LongMethod</text><text x="250" y="166">142</text>

      <!-- selected row -->
      <rect x="10" y="172" width="295" height="22" fill="#1f6feb" opacity="0.22"/>
      <rect x="10" y="172" width="3" height="22" fill="#d63a3a"/>
      <text x="20" y="188" font-weight="600">uLeakDetector2.pas</text><text x="135" y="188" fill="#d63a3a" font-weight="700">MemoryLeak</text><text x="250" y="188">87</text>

      <text x="20" y="210">uMainForm.pas</text><text x="135" y="210" fill="#c87a00">EmptyExcept</text><text x="250" y="210">23</text>
      <text x="20" y="232">uSQLInjection.pas</text><text x="135" y="232" fill="#d63a3a">SQLInjection</text><text x="250" y="232">55</text>
      <text x="20" y="254">uDivByZero.pas</text><text x="135" y="254" fill="#c87a00">DivByZero</text><text x="250" y="254">31</text>
      <text x="20" y="276">uMagicNumbers.pas</text><text x="135" y="276" fill="#1f9d55">MagicNumber</text><text x="250" y="276">12</text>
      <text x="20" y="298">uTodoComment.pas</text><text x="135" y="298" fill="#1f9d55">TodoComment</text><text x="250" y="298">9</text>
      <text x="20" y="320">uHardcodedSecret.pas</text><text x="135" y="320" fill="#d63a3a">HardcodedSecret</text><text x="250" y="320">44</text>
      <text x="20" y="342">uNilDeref.pas</text><text x="135" y="342" fill="#d63a3a">NilDeref</text><text x="250" y="342">62</text>
      <text x="20" y="364">uDeadCode.pas</text><text x="135" y="364" fill="#c87a00">DeadCode</text><text x="250" y="364">17</text>
      <text x="20" y="386">uDeepNesting.pas</text><text x="135" y="386" fill="#c87a00">DeepNesting</text><text x="250" y="386">28</text>
    </g>

    <!-- Splitter -->
    <rect x="305" y="128" width="6" height="410" fill="#bcc6d8"/>
    <line x1="308" y1="320" x2="308" y2="346" stroke="#5a6b85" stroke-width="1.5"/>
    <line x1="305" y1="333" x2="311" y2="333" stroke="#5a6b85" stroke-width="1"/>

    <!-- Detail panel (right half) -->
    <rect x="311" y="128" width="199" height="410" fill="url(#detailBg)" stroke="#9aa6bf"/>

    <!-- Severity badge -->
    <rect x="320" y="138" width="72" height="20" rx="10" fill="#d63a3a"/>
    <text x="356" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">BLOCKER</text>

    <text x="320" y="180" font-size="14" font-weight="700" fill="#0a2540">MemoryLeak</text>
    <text x="320" y="196" font-size="10.5" fill="#5a6b85">uLeakDetector2.pas : 87</text>

    <line x1="320" y1="208" x2="500" y2="208" stroke="#cfd6e3"/>

    <text x="320" y="226" font-size="11" font-weight="700" fill="#1f6feb">Beschreibung</text>
    <text x="320" y="244" font-size="10.5" fill="#1a2536">Objekt per .Create erzeugt, kein</text>
    <text x="320" y="258" font-size="10.5" fill="#1a2536">Free / FreeAndNil / Destroy im</text>
    <text x="320" y="272" font-size="10.5" fill="#1a2536">gesamten Methodenrumpf.</text>

    <text x="320" y="298" font-size="11" font-weight="700" fill="#1f6feb">Code-Snippet</text>
    <rect x="320" y="306" width="180" height="84" fill="#1e1e2e" rx="3"/>
    <g font-family="Consolas, monospace" font-size="10">
      <text x="328" y="320" fill="#82aaff">var</text>
      <text x="346" y="320" fill="#c8d3f5"> L: </text>
      <text x="370" y="320" fill="#ffc777">TList</text>
      <text x="395" y="320" fill="#c8d3f5">;</text>
      <text x="328" y="334" fill="#82aaff">begin</text>
      <text x="328" y="348" fill="#c8d3f5">  L := </text>
      <text x="362" y="348" fill="#ffc777">TList</text>
      <text x="387" y="348" fill="#c8d3f5">.</text>
      <text x="392" y="348" fill="#c3e88d">Create</text>
      <text x="421" y="348" fill="#c8d3f5">;</text>
      <text x="328" y="362" fill="#7a8aa8" font-style="italic">  // kein Free!</text>
      <text x="328" y="376" fill="#82aaff">end</text>
      <text x="346" y="376" fill="#c8d3f5">;</text>
    </g>

    <text x="320" y="408" font-size="11" font-weight="700" fill="#1f9d55">Empfehlung</text>
    <text x="320" y="426" font-size="10.5" fill="#1a2536">try ... finally L.Free; end;</text>

    <text x="320" y="452" font-size="11" font-weight="700" fill="#1f6feb">Regel-Quelle</text>
    <text x="320" y="468" font-size="10.5" fill="#1f6feb" text-decoration="underline">uLeakDetector2</text>

    <rect x="320" y="492" width="84" height="24" rx="3" fill="#1f6feb"/>
    <text x="362" y="508" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Springen</text>
    <rect x="412" y="492" width="84" height="24" rx="3" fill="#fff" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="454" y="508" text-anchor="middle" font-size="11" fill="#1f6feb" font-weight="600">Ignorieren</text>

    <!-- Annotation arrow: selection drives detail -->
    <path d="M 200,184 Q 280,184 318,184" fill="none" stroke="#1f9d55" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
    <text x="215" y="172" font-size="11" fill="#1f9d55" font-weight="700">Auswahl &#8594; Detail</text>

    <!-- Label -->
    <rect x="0" y="-26" width="200" height="20" rx="10" fill="#1f9d55"/>
    <text x="100" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">NACHHER</text>
  </g>

  <!-- Footer notes -->
  <g transform="translate(40, 680)">
    <rect x="-8" y="-18" width="1116" height="36" rx="6" fill="#fff" stroke="#bcc6d8"/>
    <text x="0" y="4" font-size="11.5" fill="#1a2536">
      <tspan font-weight="700" fill="#1f6feb">Umsetzung: </tspan>
      Panel2 (alClient) horizontal teilen &#8594; ResultGrid alLeft (Width ~60%) + TSplitter alLeft + DetailPanel alClient.
      Detail-Inhalte werden in OnSelectCell aus der gewaehlten Befundzeile aktualisiert.
    </text>
  </g>
</svg>
